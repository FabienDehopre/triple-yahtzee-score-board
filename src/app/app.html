<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
    <h1 class="mb-1 text-center text-3xl font-bold text-indigo-600">Triple Yahtzee</h1>
    <p class="mb-6 text-center text-sm text-gray-500">Score Board</p>

    <app-dice-input (confirmed)="onDiceConfirmed($event)" />

    @if (lastRoll()) {
    <div class="mt-4 rounded-xl bg-green-50 p-3 text-center text-sm text-green-700">
      Last roll: [{{ lastRoll()!.join(', ') }}]
    </div>
    }
  </div>
</div>
