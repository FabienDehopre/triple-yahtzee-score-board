<div class="relative min-h-screen bg-gray-100 px-4 py-8">
  <div class="mx-auto max-w-5xl">
    <div class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-indigo-600">Triple Yahtzee</h1>
      <p class="mt-1 text-sm text-gray-500">Score Board</p>
    </div>

    <div class="mb-4 flex justify-end">
      <app-game-count-picker />
    </div>

    <div class="mb-6 rounded-2xl bg-white p-6 shadow-lg">
      <h2 class="mb-4 text-sm font-semibold tracking-wide text-gray-500 uppercase">Enter Dice Roll</h2>
      <app-dice-input (confirmed)="onDiceConfirmed($event)" />
    </div>

    <app-suggestion-bar class="mb-4 block" />

    <app-score-sheet />
    <app-undo-banner />
  </div>

  @if (isGameOver()) {
  <div class="fixed inset-0 z-50" data-testid="game-over-overlay">
    <app-game-over />
  </div>
  }
</div>
