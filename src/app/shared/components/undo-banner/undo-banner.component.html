@if (canUndo()) {
<div
  aria-live="polite"
  class="fixed bottom-6 left-1/2 z-50 flex -translate-x-1/2 items-center gap-4 rounded-xl bg-gray-800 px-5 py-3 text-white shadow-xl"
  data-testid="undo-banner"
  role="status"
>
  <span class="text-sm">Score placed in <strong>{{ categoryLabel() }}</strong>. Undo?</span>
  <button
    aria-label="Undo last score placement"
    class="rounded-lg bg-indigo-500 px-3 py-1 text-xs font-semibold transition-colors hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-indigo-300"
    type="button"
    (click)="onUndo()"
  >
    Undo
  </button>
</div>
}
